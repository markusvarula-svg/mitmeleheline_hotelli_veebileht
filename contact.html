<!DOCTYPE html>
<html lang="et">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initialscale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<script src="https://kit.fontawesome.com/e9238a0272.js" crossorigin="anonymous"></script>
	<link rel="stylesheet" href="css/style.css">
	<title>>Hotell | Avaleht</title>
</head>
<body>
	<header>
		<nav id="navbar">
			<div class="container">
				<h1><a href="index.html">KHT</a></h1>
				<ul>
					<li><a href="index.html">Avaleht</a></li>
					<li><a href="about.html">Kirjeldus</a></li>
					<li><a class="current" href="contact.html">Kontakt</a></li>
				</ul>
			</div>
		</nav>
	</header>
	<!-- contact form -->
	 <section id="contact-form" class="py-30">
		<div class="container">
			<h1>Võta <span class="text-primary">Ühendust</span> Meiega</h1>
			<p>Palun täida all olev vorm</p>
			<form action="">
				<div class="form-group">
					<label for="name">Nimi</label>
					<input type="text" id="name">
				</div>
				<div class="form-group">
					<label for="email">Email</label>
					<input type="text" id="email">
				</div>
				<div class="form-group">
					<label for="message">Sõnum</label>
					<textarea id="message"></textarea>
				</div>
				<button type="submit" class="btn">Saada</button>
			</form>
		</div>
	 </section>
	 <!-- contact info -->
	  <section id="contact-info" class="bg-dark">
		<div class="container">
			<div class="box bg-dark">
				<i class="fas fa-hotel fa-3x"></i>
				<h3>Aadress</h3>
				<p>Ei tea</p>
			</div>
			<div class="box bg-dark">
				<i class="fas fa-phone fa-3x"></i>
				<h3>Telefon</h3>
				<p>5555 5535</p>
			</div>
			<div class="box bg-dark">
				<i class="fas fa-envelope fa-3x"></i>
				<h3>Email</h3>
				<p>info@kht.ee</p>
			</div>
		</div>
	  </section>
	<div class="clear"></div>
	<footer>
		<p>KHT &copy;2021, Kõik Õigused on Kaitstud</p>
	</footer>
</body>
</html>
